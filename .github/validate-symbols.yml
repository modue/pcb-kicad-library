# .github/workflows/validate-symbols.yml
#
# Validates all KiCad 9 .kicad_sym library files on every push and pull
# request.  Violations are surfaced as ⚠️ warnings (non-blocking) via:
#   • GitHub Actions inline annotations (visible on the PR "Files changed" tab)
#   • A Markdown table in the job's Step Summary
#
# To switch to strict / blocking mode: change WARN_ONLY to "false" below.

name: Validate KiCad Symbols

on:
  push:
    branches: ["**"]
    paths:
      - "**.kicad_sym"          # only run when symbol files actually change
      - ".github/workflows/validate-symbols.yml"
      - "scripts/validate_symbols.py"
  pull_request:
    paths:
      - "**.kicad_sym"
      - ".github/workflows/validate-symbols.yml"
      - "scripts/validate_symbols.py"

# Cancel in-progress runs for the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── Validation settings ───────────────────────────────────────────────────
  # Space-separated list of property names that EVERY non-power symbol must
  # have, with a non-empty value.
  REQUIRED_FIELDS: >-
    Reference
    Value
    Footprint
    Datasheet
    Description
    MPN
    Manufacturer
    IPN

  # Set to "false" to make the job fail when violations are found.
  WARN_ONLY: "true"

jobs:
  validate-symbols:
    name: Symbol property check
    runs-on: ubuntu-24.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so changed-file detection works on any branch.
          fetch-depth: 0

      # ── 2. Python setup ────────────────────────────────────────────────────
      # The validator has zero external Python dependencies – the standard
      # library is sufficient.  We only need a reasonably modern interpreter.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Detect changed symbol files ────────────────────────────────────
      # On a pull_request event we only validate files that were actually
      # touched in the PR, keeping feedback fast on large repos.
      # On a push to a branch we validate everything (full audit).
      - name: Detect changed .kicad_sym files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Files changed between the PR base and the HEAD commit
            CHANGED=$(git diff --name-only \
              origin/${{ github.base_ref }}...HEAD \
              -- '*.kicad_sym' | tr '\n' ' ')
          else
            # Full scan on direct push
            CHANGED=$(find . -name '*.kicad_sym' | tr '\n' ' ')
          fi

          echo "files=${CHANGED}" >> "$GITHUB_OUTPUT"

          if [ -z "$CHANGED" ]; then
            echo "no_sym_files=true"  >> "$GITHUB_OUTPUT"
          else
            echo "no_sym_files=false" >> "$GITHUB_OUTPUT"
            echo "### Files to validate" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$CHANGED" | tr ' ' '\n' | grep -v '^$' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 4. Early exit when no symbol files are involved ───────────────────
      - name: Skip when no .kicad_sym files changed
        if: steps.changed.outputs.no_sym_files == 'true'
        run: |
          echo "No .kicad_sym files in this changeset – skipping validation."
          echo "## KiCad Symbol Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "ℹ️ No \`.kicad_sym\` files changed – nothing to validate." \
            >> "$GITHUB_STEP_SUMMARY"

      # ── 5. Run the validator ───────────────────────────────────────────────
      - name: Validate symbol properties
        if: steps.changed.outputs.no_sym_files == 'false'
        run: |
          # Build the argument list from the space-separated env var
          read -ra FIELDS <<< "$REQUIRED_FIELDS"
          FIELD_ARGS=()
          for f in "${FIELDS[@]}"; do
            FIELD_ARGS+=("$f")
          done

          # Build mode flag
          if [ "$WARN_ONLY" = "true" ]; then
            MODE_FLAG="--warn-only"
          else
            MODE_FLAG="--strict"
          fi

          # Run validator against the detected file list
          # shellcheck disable=SC2046
          python scripts/validate_symbols.py \
            $MODE_FLAG \
            --required-fields "${FIELD_ARGS[@]}" \
            -- \
            ${{ steps.changed.outputs.files }}

      # ── 6. Upload full report as artifact ─────────────────────────────────
      # Useful for auditing even when the job is non-blocking.
      - name: Upload validation log
        if: always() && steps.changed.outputs.no_sym_files == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: symbol-validation-report-${{ github.run_number }}
          path: |
            scripts/validate_symbols.py
          retention-days: 30
